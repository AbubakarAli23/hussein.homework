<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhyme Time Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0fdf4; /* Light green background */
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
        }
        .emoji-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .emoji-card:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="game-container" class="bg-white rounded-3xl shadow-xl p-8 max-w-2xl w-full text-center border-4 border-green-400">
        
        <!-- Header -->
        <h1 class="text-4xl font-bold text-green-600 mb-2">Rhyme Time! 🎵</h1>
        <p class="text-gray-600 text-lg mb-8">Choose the picture that rhymes with the word.</p>

        <!-- Game Screen -->
        <div id="quiz-screen">
            <div class="mb-8">
                <p class="text-2xl text-gray-500 mb-2">Word <span id="current-q">1</span> of 10</p>
                <!-- The Target Word -->
                <div class="bg-blue-100 border-4 border-blue-400 rounded-2xl p-6 inline-block shadow-md">
                    <span id="target-word" class="text-6xl font-extrabold text-blue-700 uppercase tracking-wider"></span>
                </div>
            </div>

            <p class="text-xl text-gray-700 mb-4 font-semibold">Which picture rhymes?</p>
            
            <!-- Options Grid -->
            <div id="options-container" class="flex flex-wrap justify-center gap-6">
                <!-- Buttons injected by JS -->
            </div>

            <!-- Feedback area -->
            <div id="feedback" class="h-12 mt-6 text-2xl font-bold transition-opacity duration-300 opacity-0"></div>
        </div>

        <!-- Result Screen (Hidden initially) -->
        <div id="result-screen" class="hidden">
            <h2 class="text-5xl mb-4">🎉</h2>
            <h2 class="text-4xl font-bold text-purple-600 mb-4">Great Job!</h2>
            <p class="text-2xl text-gray-700 mb-8">You got <span id="score" class="font-extrabold text-green-500 text-3xl"></span> out of 10 correct!</p>
            <button onclick="restartGame()" class="bg-green-500 hover:bg-green-600 text-white text-2xl font-bold py-4 px-8 rounded-full shadow-lg transition transform hover:scale-105">
                Play Again 🔄
            </button>
        </div>

    </div>

    <script>
        const quizData = [
            { word: "Cat", correctEmoji: "🦇", correctName: "Bat", options: ["🦇", "🐶", "🐟"] },
            { word: "Tree", correctEmoji: "🐝", correctName: "Bee", options: ["🍎", "🐝", "🚗"] },
            { word: "Fox", correctEmoji: "📦", correctName: "Box", options: ["📦", "🌙", "🎈"] },
            { word: "Bear", correctEmoji: "🍐", correctName: "Pear", options: ["🍌", "🍉", "🍐"] },
            { word: "House", correctEmoji: "🐭", correctName: "Mouse", options: ["🐭", "🐱", "🐶"] },
            { word: "Snail", correctEmoji: "🐋", correctName: "Whale", options: ["🐢", "🐋", "🐸"] },
            { word: "Train", correctEmoji: "✈️", correctName: "Plane", options: ["🚁", "✈️", "⛴️"] },
            { word: "Sun", correctEmoji: "🍔", correctName: "Bun", options: ["🍕", "🍔", "🌮"] },
            { word: "Snake", correctEmoji: "🎂", correctName: "Cake", options: ["🎂", "🍩", "🍪"] },
            { word: "Star", correctEmoji: "🚗", correctName: "Car", options: ["🚲", "🚌", "🚗"] }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let isAnswering = false;

        const targetWordEl = document.getElementById('target-word');
        const optionsContainer = document.getElementById('options-container');
        const currentQEl = document.getElementById('current-q');
        const feedbackEl = document.getElementById('feedback');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const scoreEl = document.getElementById('score');

        function loadQuestion() {
            isAnswering = false;
            feedbackEl.style.opacity = '0';
            
            const currentQuestion = quizData[currentQuestionIndex];
            targetWordEl.textContent = currentQuestion.word;
            currentQEl.textContent = currentQuestionIndex + 1;
            
            // Clear previous options
            optionsContainer.innerHTML = '';

            // Shuffle options (simple shuffle)
            const shuffledOptions = [...currentQuestion.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(emoji => {
                const button = document.createElement('button');
                button.className = 'emoji-card bg-gray-50 border-4 border-gray-200 rounded-2xl p-6 text-6xl shadow-sm focus:outline-none';
                button.textContent = emoji;
                button.onclick = () => selectAnswer(emoji, button);
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(selectedEmoji, buttonElement) {
            if (isAnswering) return;
            isAnswering = true;

            const currentQuestion = quizData[currentQuestionIndex];
            const isCorrect = selectedEmoji === currentQuestion.correctEmoji;

            if (isCorrect) {
                buttonElement.classList.remove('border-gray-200', 'bg-gray-50');
                buttonElement.classList.add('border-green-500', 'bg-green-100');
                feedbackEl.textContent = `Correct! ${currentQuestion.word} rhymes with ${currentQuestion.correctName}.`;
                feedbackEl.className = 'h-12 mt-6 text-2xl font-bold transition-opacity duration-300 text-green-600';
                score++;
            } else {
                buttonElement.classList.remove('border-gray-200', 'bg-gray-50');
                buttonElement.classList.add('border-red-500', 'bg-red-100');
                feedbackEl.textContent = "Oops! Let's try the next one.";
                feedbackEl.className = 'h-12 mt-6 text-2xl font-bold transition-opacity duration-300 text-red-500';
                
                // Highlight correct answer
                const allButtons = optionsContainer.getElementsByTagName('button');
                for (let btn of allButtons) {
                    if (btn.textContent === currentQuestion.correctEmoji) {
                        btn.classList.remove('border-gray-200', 'bg-gray-50');
                        btn.classList.add('border-green-500', 'bg-green-100');
                    }
                }
            }

            feedbackEl.style.opacity = '1';

            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 2500); // Wait 2.5 seconds before moving to next question
        }

        function showResults() {
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            scoreEl.textContent = score;
        }

        function restartGame() {
            currentQuestionIndex = 0;
            score = 0;
            quizScreen.classList.remove('hidden');
            resultScreen.classList.add('hidden');
            loadQuestion();
        }

        // Start the game
        loadQuestion();
    </script>
</body>
</html>
